<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit an Activity</title>
  <link rel="stylesheet" href="../styles/styles.css">
</head>

<body>

  <header>
    <nav class="navbar">
        <a href="../index.html" class="logo"><h1 class="logo">BYU-I Adventures</h1></a>

        <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="submit.html">Submit</a></li>
        <li><a href="activities.html" class="non-mobile">All Activities</a></li>
        <li><a href="outdoor.html" class="non-mobile">Outdoor</a></li>
        <li><a href="indoor.html" class="non-mobile">Indoor</a></li>
        <li><a href="food.html" class="non-mobile">Food</a></li>
        </ul>
    </nav>
    </header>

<section class="section">
  <div class="section-title">
    <h2>Submit An Activity</h2>
    <p>Share fun activities with other BYU-Idaho students.</p>
  </div>

  <form id="activity-form">

    <label for="name">Your Name</label>
    <input type="text" id="name" placeholder="Your Name" required>

    <label for="activityName">Activity Name</label>
    <input type="text" id="activityName" placeholder="Activity Name" required>

    <label for="category">Category</label>
    <select id="category" required style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc;">
      <option value="" disabled selected>Select a Category</option>
      <option value="Outdoor">Outdoor</option>
      <option value="Indoor">Indoor</option>
      <option value="Food">Food</option>
    </select>

    <label for="description">Description</label>
    <textarea id="description" placeholder="Describe the activity" required></textarea>

    <label for="price">Estimated Cost</label>
    <input type="text" id="price" placeholder="Free or $5 - $20">

    <button type="submit">Submit Activity</button>

  </form>
</section>

<footer>
  <div class="footer-content">
    <h3 class="footer-logo">BYU-I Adventures</h3>

    <p>Discover affordable fun around Rexburg.</p>

    <div class="footer-links">
      <a href="../index.html">Home</a>
      <a href="activities.html">All Activities</a>
      <a href="about.html">About</a>
      <a href="submit.html">Submit</a>
    </div>
  </div>
</footer>

<script type="module">
  // 🌟 Cleaned up import path for GitHub Pages subfolder
  import { db } from "../firebase.js";

  import { collection, addDoc, serverTimestamp } 
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const form = document.getElementById("activity-form");

  // Submit form data to Firestore
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const activityName = document.getElementById("activityName").value;
    const category = document.getElementById("category").value;
    const description = document.getElementById("description").value;
    const price = document.getElementById("price").value || "Free";

    try {
      // Sends data straight to your Firestore "activities" collection
      await addDoc(collection(db, "activities"), {
        name,
        activityName,
        category,
        description,
        price,
        createdAt: serverTimestamp()
      });

      alert("Activity submitted successfully!");
      form.reset();

    } catch (error) {
      console.error("Error adding document to Firestore:", error);
      alert("Error submitting activity. Check the browser console for details.");
    }
  });
</script>

</body>
</html>
