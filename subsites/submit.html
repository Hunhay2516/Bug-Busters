<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outdoor Activities</title>
  <link rel="stylesheet" href="../styles/styles.css">
</head>

<body>

<header>
  <nav class="navbar">
    <a href="../index.html" class="logo">
      <h1 class="logo">BYU-I Adventures</h1>
    </a>

    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="outdoor.html">Outdoor</a></li>
      <li><a href="indoor.html">Indoor</a></li>
      <li><a href="food.html">Food</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>
</header>

<section class="section">
  <div class="section-title">
    <h2>Submit An Activity</h2>
    <p>Share fun activities with other BYU-Idaho students.</p>
  </div>

  <form id="activity-form">

    <label>Name</label>
    <input type="text" id="name" placeholder="Your Name" required>

    <label>Activity Name</label>
    <input type="text" id="activityName" placeholder="Activity Name" required>

    <label>Description</label>
    <textarea id="description" placeholder="Describe the activity" required></textarea>

    <label>Estimated Cost</label>
    <input type="text" id="price" placeholder="$0 - $20">

    <button type="submit">Submit Activity</button>

  </form>
</section>

<footer>
  <div class="footer-content">
    <h3 class="footer-logo">BYU-I Adventures</h3>

    <p>Discover affordable fun around Rexburg.</p>

    <div class="footer-links">
      <a href="../index.html">Home</a>
      <a href="about.html">About</a>
      <a href="submit.html">Submit</a>
    </div>
  </div>
</footer>

<script type="module">
  // Step up one directory explicitly to find firebase.js on GitHub Pages
  import { db } from "./../firebase.js";

  import { collection, addDoc, serverTimestamp } 
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const form = document.getElementById("activity-form");

  // Submit form data to Firestore
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const activityName = document.getElementById("activityName").value;
    const description = document.getElementById("description").value;
    const price = document.getElementById("price").value;

    try {
      // Sends data straight to your Firestore "activities" collection
      await addDoc(collection(db, "activities"), {
        name,
        activityName,
        description,
        price,
        category: "Outdoor",
        createdAt: serverTimestamp()
      });

      alert("Activity submitted successfully!");
      form.reset();

    } catch (error) {
      console.error("Error adding document to Firestore:", error);
      alert("Error submitting activity. Check the browser console for details.");
    }
  });
</script>

</body>
</html>
