<section class="section">
  <div class="section-title">
    <h2>Submit An Activity</h2>
    <p>Share fun activities with other BYU-Idaho students.</p>
  </div>

  <form>

    <label>Name</label>
    <input type="text" placeholder="Your Name">

    <label>Activity Name</label>
    <input type="text" placeholder="Activity Name">

    <label>Description</label>
    <textarea placeholder="Describe the activity"></textarea>

    <label>Estimated Cost</label>
    <input type="text" placeholder="$0 - $20">

    <button type="submit">Submit Activity</button>

  </form>
</section>
